name: release-sanity

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify required release assets exist
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path(".")
          required = [
              root / "README.md",
              root / "environment.yml",
              root / "configs" / "dataset_config.example.json",
              root / "docs" / "index.html",
              root / "docs" / "app.js",
              root / "docs" / "styles.css",
              root / "docs" / "assets" / "figures" / "teaser-regimes.png",
              root / "docs" / "assets" / "figures" / "method-overview.png",
              root / "docs" / "assets" / "figures" / "case-study.png",
              root / "docs" / "assets" / "figures" / "social-preview.png",
              root / "docs" / "assets" / "papers" / "ffr-appendix.pdf",
              root / "scripts" / "check_project_page.py",
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit(f"Missing required release assets: {missing}")
          print("Release assets verified.")
          PY

      - name: Compile Python package
        run: python -m compileall ffr

      - name: Check smoke-test syntax
        run: python -m py_compile scripts/smoke_test.py

      - name: Check project page
        run: python scripts/check_project_page.py
