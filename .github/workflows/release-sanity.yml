name: release-sanity

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify required release assets exist
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path(".")
          required = [
              root / "README.md",
              root / "environment.yml",
              root / "configs" / "dataset_config.example.json",
              root / "docs" / "index.html",
              root / "docs" / "app.js",
              root / "docs" / "styles.css",
              root / "docs" / "assets" / "data" / "site-data.js",
              root / "docs" / "assets" / "papers" / "ffr-paper.pdf",
              root / "docs" / "assets" / "papers" / "ffr-supplement.pdf",
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit(f"Missing required release assets: {missing}")
          print("Release assets verified.")
          PY

      - name: Compile Python package
        run: python -m compileall ffr

      - name: Check smoke-test syntax
        run: python -m py_compile scripts/smoke_test.py
